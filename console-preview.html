.gs-in{background:transparent;border-radius:14px;padding:14px 14px 12px;height:100%}
.gs-tile.wide{grid-column:span 2}
.te{font-size:30px;line-height:1}
.tn{font-family:'Orbitron';font-weight:700;font-size:14px;margin:8px 0 4px;letter-spacing:.5px}
.to{font-family:'Rajdhani';font-size:12.5px;color:#aab4c4;line-height:1.35;min-height:34px}

.mbg.on{display:flex}

.mov{font-size:15px;color:#dfe7f0;line-height:1.5;margin:14px 0}
.mh{font-family:'Orbitron';font-weight:700;font-size:12px;letter-spacing:2px;color:var(--cyan);margin:16px 0 6px;text-transform:uppercase}
.mul{margin:0;padding-left:18px;font-size:13.5px;color:#c3ccda;line-height:1.6}

.pill{display:inline-block;font-family:'Share Tech Mono';font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid currentColor;margin-left:8px;vertical-align:middle}
